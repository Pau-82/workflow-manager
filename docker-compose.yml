services:
  postgres:
    image: postgres:16-alpine
    container_name: workflow-manager-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wfm
      POSTGRES_PASSWORD: wfm_password
      POSTGRES_DB: workflow_manager
    ports:
      - '5432:5432'
    volumes:
      - workflow_manager_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wfm -d workflow_manager']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  workflow_manager_pgdata:
